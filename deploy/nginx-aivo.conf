# Финальный vhost aivo.band: http→https редирект + прокси на контейнер (оба имени).
server {
    listen 80;
    listen [::]:80;
    server_name aivo.band www.aivo.band;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name aivo.band www.aivo.band;

    ssl_certificate     /etc/letsencrypt/live/aivo.band/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aivo.band/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
