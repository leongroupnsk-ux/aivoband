# Прод-запуск на VPS: docker compose up -d --build
# Секреты — в файле .env рядом (не коммитится), см. .env.example
services:
  site:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://aivo.example}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://aivo.example}
